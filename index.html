<!DOCTYPE html>
<html>

<head>
	<meta name="viewport" content="width=device-width,initial-scale=1.0">
	<meta charset="utf-8">
	<title>Xchat | Xapp.com</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
	<link rel="stylesheet" href="./css/styles.css">
</head>

<body>

	<div class="container">

		<div class="row">

			<!--Левая секция (блок поиска контактов, перечень контактов)-->
			<div class="col-3 section">
			<!--Шапка левой секции (форма поиска контактов в перечне)-->
				<div class="header-section">
					<form class="messege-form d-flex align-items-center">
						<div class="flex-grow-1 me-2">
							<input autocomplete="off" type="text" class="form-control"
								placeholder="Search conversations..." id="input-search" />
						</div>
						<button class="btn" id="btn-search">
							<i class="bi bi-search"></i>
						</button>
					</form>

				</div>
			<!--Поле аккаунтов людей-->
				<div class="accounts">

					<div class="active-account rounded m-2 d-flex m-2 align-items-center">
						<div>
							<img src="./img/profile.png" class="rounded-circle mx-2" width="40" alt="...">
						</div>
						<div>
							<h5 class="text-light">Zidane</h5>
							<small class="text-success"><b>Online</b></small>
						</div>
					</div>

					<div class="rounded m-2 d-flex m-2 align-items-center">
						<div>
							<img src="./img/profile.png" class="rounded-circle mx-2" width="40" alt="...">
						</div>

						<div>
							<h5 class="text-light">Ronaldo</h5>
							<small class="text-warning"><b>Offline</b></small>
						</div>
					</div>

				</div>
			</div>



			<!--Правая секция (блок заголовка контакта, блок сообщений, инпут отправки сообщения)-->
			<div class="col-8 section">
			<!--Шапка правой секции (заголовок выбранного контакта из левой секции, кнопкм видеозвонка, звонка, настроек)-->
				<div class="header-section">
					<div class="d-flex justify-content-between">
						<div class="d-flex align-items-center">
							<div>
								<img src="./img/profile.png" class="rounded-circle mx-2" width="40" alt="...">
							</div>
							<div>
								<h5 class="text-light">Zidane</h5>
								<small class="text-light">2 Messages</small>
							</div>
						</div>
						<!--Кнопки Видеовызов, вызов, настройки (возможно чтото еще)-->
						<div class="btn-call">

							<button class="btn">
								<i class="bi bi-camera-video"></i>
							</button>

							<button class="btn">
								<i class="bi bi-telephone"></i>
							</button>

							<button class="btn">
								<i class="bi bi-three-dots-vertical"></i>
							</button>

						</div>
					</div>
				</div>
				<!--Поле сообщений-->
				<div id="messages">

					<!-- Пример полученного сообщения -->

					<div class="message message-buddy">
						<div>Привет! Как твои дела???</div>
						<small>10:30</small>
					</div>

					<!-- Пример отправленного сообщения -->

					<div class="message message-my">
						<div>Привет! Всё отлично, спасибо!</div>
						<small>10:32</small>
					</div>

				</div>
				<!--Форма для отправки сообщения (инпут для месседжа)-->
				<div class="messege-form border-top border-light border-2 p-3">
					<form class="messege-form d-flex align-items-center" id="form" action="">
						<div class="flex-grow-1 me-2">
							<input autocomplete="off" type="text" class="form-control" placeholder="Write a message..."
								id="input" />
						</div>
						<button class="btn" id="btn-input">
							<i class="bi bi-send"></i>
						</button>
					</form>
				</div>
			</div>

		</div>

	</div>


	<!-- Сущевтует три разных варианта подлкючения библиотеки socket на стороне клиента для файла index.html -->
	<!-- 1 - путь к библиотеке в инете (пока что используем этот вариант. Лучше использовать 2 или 3, но пока еще не нашел как сделать, чтобы работало для локального и удаленного сервера одинаково) -->
	<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

	<!-- 2 - глобалный путь к библиотеке установленной во время команды npm install (не работает на удаленном сервере) -->
	<!-- <script src="/socket.io/socket.io.js"></script> -->

	<!-- 3 - путь к библиотеке в папке node_modules -->
	<!-- <script src="node_modules/socket.io/client-dist/socket.io.js"></script> -->

	<!-- Bootstrap 5 JS Bundle with Popper -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

	<script>
		// Создаем сокет чата на стороне клиента для файла index.html
		const socket = io(
			// 1 параметр - оригинальный адрес сайта на котором запускается чат
			window.location.origin,

			// 2 параметр - объект из разных свойств. В нашем случае передаем свойство "path" которое указывает дирекотрию/папку сайта в которой запускается файл index.html
			// !!! - к дериктории/папке добавляем строку "socket.io" (отсутствие этой строки не позволяло запускать чат на удаленном сервере)
			{
				path: window.location.pathname + 'socket.io'
			}
		);

		// Создаем константы для работы с формой, полем ввода сообщения, списком сообщений
		const form = document.getElementById('form');
		const input = document.getElementById('input');
		const messages = document.getElementById('messages');

		// Подключаемся к событию отправки форм
		form.addEventListener('submit', (e) => {
			// отключаем событие по умолчанию
			e.preventDefault();
			// проверяем поле формы
			if (input.value) {
				// если поле формы не пустое
				// отправляем сообщение для события чата под именем "chat_message"(имя может быть любое)
				socket.emit('chat_message', input.value);
				// после отправки сообщения чистим поле для нового сообщения
				input.value = '';
			}
		});

		// подключаемся к событию чата chat_message
		// для получаения сообщеий от данного события
		socket.on('chat_message', (msg) => {
			// создаем элемент списка
			const item = document.createElement('div');
			// присваиваем классы диву
			item.className = "message message-my";
			//время сообщения
			const now = new Date();
			const timeString = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
			// добавляем сообщение от сокета в элемент списка
			item.innerHTML = `
				<div>${msg}</div>
				<small>${timeString}</small>	
			`;
			// добавляем новый элемент
			messages.appendChild(item);
			// скролим экран к последнему сообщению (пока что показатель 100000)
			document.getElementById('messages').scrollTo(0, 100000);
		});

		// подключаем код сокета для ловли ошибок
		socket.on("connect_error", (err) => {
			console.log(err.message);
			console.log(err.description);
			console.log(err.context);
		});

	</script>
</body>

</html>
